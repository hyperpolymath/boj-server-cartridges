name = "google-docs-mcp"
description = "Google Docs cartridge — document retrieval, content reading, heading extraction, text search, comments, suggestions, revisions, named ranges, document creation, text insertion"
version = "0.2.0"
domain = "Productivity"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "oauth2"
credential_source = "vault-mcp"
fields = ["google_docs_access_token"]

[api]
base_url = "https://docs.googleapis.com/v1"
local_only = false
