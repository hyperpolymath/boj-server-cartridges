name = "fly-mcp"
description = "Fly.io Machines API v1 cartridge -- apps, machines, volumes, secrets, regions, IPs"
version = "0.1.0"
domain = "Cloud"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer"
token_env = "FLY_API_TOKEN"
base_url = "https://api.machines.dev/v1/"

[actions]
list = [
    "ListApps",
    "GetApp",
    "CreateApp",
    "DestroyApp",
    "ListMachines",
    "GetMachine",
    "StartMachine",
    "StopMachine",
    "ListVolumes",
    "CreateVolume",
    "ListSecrets",
    "SetSecret",
    "DeleteSecret",
    "ListRegions",
    "AllocateIP",
    "ReleaseIP",
]
