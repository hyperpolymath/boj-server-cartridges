name = "prometheus-mcp"
description = "Prometheus monitoring cartridge — instant/range PromQL queries, target discovery, alerts, label browsing, metric metadata, series listing"
version = "0.1.0"
domain = "Monitoring"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["prometheus_token"]

[api]
base_url = "https://prometheus.example.com/api/v1"
