#
# Proofs Gate — type-check every Idris2 cartridge ABI + the Foundry design proof,
# and enforce a zero-axiom trusted base.
#
# boj-server-cartridges is the canonical cartridge home, but until now nothing
# ran `idris2` in CI here — only boj-server had a Proofs Gate. That let 23
# cartridge ABI proofs in this repo rot into non-compiling states while their
# boj-server twins stayed green (issues #36 / #37). This gate closes that hole:
# it type-checks every .idr under cartridges/**/abi plus tools/foundry/proof
# under the pinned toolchain (.tool-versions -> idris2 0.8.0), and runs the
# trusted-base audit so no believe_me / axiom can slip into a leaf proof.
name: Proofs Gate

# Was workflow-level path-filtered: a required check that never ran on PRs
# touching none of its paths, leaving the check "Expected" and the PR blocked.
# Now always runs; the `changes` job gates the heavy jobs, which when skipped
# report SUCCESS to required checks.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: proofs-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -uo pipefail
          run=true
          if [ "$EVENT" = pull_request ]; then
            git fetch --no-tags --depth=200 origin "$BASE" 2>/dev/null \
              && changed=$(git diff --name-only "origin/${BASE}...HEAD" 2>/dev/null) \
              && { printf '%s\n' "$changed" | grep -qE '^cartridges/.*/abi/|^tools/foundry/proof/|^scripts/check-trusted-base\.sh$|^scripts/typecheck-proofs\.sh$|^\.tool-versions$' && run=true || run=false; }
          elif [ "$EVENT" = push ] && [ -n "$BEFORE" ] && [ "$BEFORE" != 0000000000000000000000000000000000000000 ]; then
            changed=$(git diff --name-only "${BEFORE}...${GITHUB_SHA}" 2>/dev/null) \
              && { printf '%s\n' "$changed" | grep -qE '^cartridges/.*/abi/|^tools/foundry/proof/|^scripts/check-trusted-base\.sh$|^scripts/typecheck-proofs\.sh$|^\.tool-versions$' && run=true || run=false; }
          fi
          printf 'run=%s\n' "$run" >> "$GITHUB_OUTPUT"
          echo "relevant=$run; changed files:"; printf '%s\n' "${changed:-<none computed>}"

  # Cheap, dependency-free gate: scan for unsound constructs (must be axiom-free).
  trusted-base:
    name: Trusted-base audit (zero axioms)
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - name: Enforce zero-axiom trusted base
        run: bash scripts/check-trusted-base.sh

  # Full type-check of every cartridge ABI + Foundry under the pinned Idris2.
  typecheck:
    name: Idris2 type-check (all cartridge ABIs + Foundry)
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1

      - name: Read pinned Idris2 version
        id: ver
        run: echo "idris2=$(awk '/^idris2 /{print $2}' .tool-versions)" >> "$GITHUB_OUTPUT"

      - name: Install build deps (Chez Scheme + GMP)
        run: sudo apt-get update && sudo apt-get install -y chezscheme libgmp-dev build-essential

      - name: Cache asdf + Idris2 toolchain
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.asdf
          key: idris2-asdf-${{ runner.os }}-${{ steps.ver.outputs.idris2 }}

      - name: Install asdf + Idris2 ${{ steps.ver.outputs.idris2 }}
        env:
          # Ubuntu's chezscheme package installs the interpreter as `scheme`;
          # Idris2's bootstrap Makefile reads $SCHEME (defaults to `chez`).
          SCHEME: scheme
        run: |
          set -euo pipefail
          if [ ! -f "$HOME/.asdf/asdf.sh" ]; then
            git clone --depth 1 --branch v0.14.0 https://github.com/asdf-vm/asdf.git "$HOME/.asdf"
          fi
          . "$HOME/.asdf/asdf.sh"
          asdf plugin add idris2 || true
          asdf install idris2 "${{ steps.ver.outputs.idris2 }}"
          asdf global  idris2 "${{ steps.ver.outputs.idris2 }}"

      - name: Put Idris2 on PATH
        run: echo "$HOME/.asdf/shims" >> "$GITHUB_PATH"

      - name: Idris2 version
        run: idris2 --version

      - name: Type-check all proofs (cartridge ABIs + Foundry)
        run: bash scripts/typecheck-proofs.sh
