# SPDX-License-Identifier: MPL-2.0
# Builds and tests the Zig FFI of any cartridge whose ffi/ changed. Adapted
# from boj-server's zig-test.yml for this repo's hybrid taxonomy: cartridges
# live under cartridges/domains/<domain>/<name> and cartridges/cross-cutting/
# <category>/<name>, so the cartridge-root glob is one level deeper than the
# old flat cartridges/<name> layout.
name: Zig Cartridge Tests

# Was workflow-level path-filtered: a required check that never ran on PRs
# touching none of its paths, leaving the check "Expected" and the PR blocked.
# Now always runs; the `changes` job gates the heavy job, which when skipped
# reports SUCCESS to required checks. (zig-test also does its own per-cartridge
# scoping for the relevant case.)
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  changes:
    name: Detect relevant changes
    runs-on: ubuntu-latest
    timeout-minutes: 5
    outputs:
      run: ${{ steps.detect.outputs.run }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - id: detect
        env:
          EVENT: ${{ github.event_name }}
          BASE: ${{ github.base_ref }}
          BEFORE: ${{ github.event.before }}
        run: |
          set -uo pipefail
          run=true
          if [ "$EVENT" = pull_request ]; then
            git fetch --no-tags --depth=200 origin "$BASE" 2>/dev/null \
              && changed=$(git diff --name-only "origin/${BASE}...HEAD" 2>/dev/null) \
              && { printf '%s\n' "$changed" | grep -qE '^cartridges/.*/ffi/' && run=true || run=false; }
          elif [ "$EVENT" = push ] && [ -n "$BEFORE" ] && [ "$BEFORE" != 0000000000000000000000000000000000000000 ]; then
            changed=$(git diff --name-only "${BEFORE}...${GITHUB_SHA}" 2>/dev/null) \
              && { printf '%s\n' "$changed" | grep -qE '^cartridges/.*/ffi/' && run=true || run=false; }
          fi
          printf 'run=%s\n' "$run" >> "$GITHUB_OUTPUT"
          echo "relevant=$run; changed files:"; printf '%s\n' "${changed:-<none computed>}"

  zig-test:
    name: Build and test Zig cartridge FFI
    needs: changes
    if: needs.changes.outputs.run == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # Need history for `git diff origin/main...HEAD` to find a merge base
          # when main has advanced beyond the PR branch's fork point. With the
          # default shallow clone the diff fails with `no merge base`.
          fetch-depth: 0

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29 # v2
        with:
          version: 0.15.2

      - name: Build and test changed cartridges
        run: |
          set -euo pipefail
          # Determine changed cartridges (by ffi dir) — on push, diff against
          # the previous commit; on PR, against the base ref.
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_REF="${{ github.base_ref }}"
            git fetch origin "$BASE_REF" --depth=1
            DIFF_BASE="origin/$BASE_REF"
          else
            DIFF_BASE="HEAD~1"
          fi

          # A cartridge root is the directory that holds ffi/. Strip the trailing
          # ffi/... segment from each changed path; works for any nesting depth
          # (domains/<d>/<name>/ffi, cross-cutting/<c>/<name>/ffi, …).
          changed="$(git diff --name-only "$DIFF_BASE...HEAD" -- 'cartridges/**/ffi/**' \
            | sed 's|/ffi/.*||' | sort -u)"

          if [ -z "$changed" ]; then
            echo "No cartridge FFI changes detected."
            exit 0
          fi

          for cart in $changed; do
            echo "::group::$cart"
            if [ -f "$cart/ffi/build.zig" ]; then
              ( cd "$cart/ffi" && zig build test --summary all )
            else
              echo "no ffi/build.zig — skipping"
            fi
            echo "::endgroup::"
          done
