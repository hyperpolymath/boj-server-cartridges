name = "buildkite-mcp"
description = "Buildkite CI/CD cartridge — pipeline listing, build management, job inspection, artifacts, agents, log retrieval, build triggering, cancellation"
version = "0.1.0"
domain = "CI/CD"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["buildkite_api_token"]

[api]
base_url = "https://api.buildkite.com/v2"
