name = "hex-mcp"
description = "Hex.pm registry cartridge — Elixir/Erlang package search, metadata, release listing, download stats, dependencies, owners, retirement status, user profiles"
version = "0.2.0"
domain = "Registry"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["hex_api_key"]

[api]
base_url = "https://hex.pm/api"
