# SonarQube Cloud (SonarCloud) configuration.
# Project: https://sonarcloud.io/project/overview?id=hyperpolymath_boj-server-cartridges
sonar.organization=hyperpolymath
sonar.projectKey=hyperpolymath_boj-server-cartridges

# This repo is the cartridge source tree. SonarCloud analyses the JS adapters;
# Idris2 ABIs, Zig FFI, generated code, machine-readable manifests, docs, and
# schemas have no SonarCloud analyser and are excluded to keep findings
# signal-rich.
sonar.exclusions=**/*.idr,**/*.zig,**/abi/**,**/ffi/**,**/zig-out/**,generated/**,**/generated/**,.machine_readable/**,docs/**,schemas/**,**/node_modules/**
sonar.coverage.exclusions=**/*test*,**/tests/**
