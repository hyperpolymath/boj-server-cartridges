name = "google-sheets-mcp"
description = "Google Sheets cartridge — spreadsheet metadata, cell range reading, sheet listing, named ranges, cell writing, row appending, sheet creation, batch reads, conditional formats, pivot tables"
version = "0.2.0"
domain = "Productivity"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "oauth2"
credential_source = "vault-mcp"
fields = ["google_sheets_access_token"]

[api]
base_url = "https://sheets.googleapis.com/v4"
local_only = false
