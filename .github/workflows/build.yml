#
# SonarQube Cloud (SonarCloud) static analysis. Analysis scope + exclusions
# live in sonar-project.properties. Requires the SONAR_TOKEN repository secret
# (Settings -> Secrets and variables -> Actions).
# Project: https://sonarcloud.io/project/overview?id=hyperpolymath_boj-server-cartridges
name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
jobs:
  sonarqube:
    name: SonarQube
    # Dependabot-authored runs get a secrets-restricted GITHUB_TOKEN and
    # cannot see repo Actions secrets (only the separate Dependabot secrets
    # store, which SONAR_TOKEN isn't in) -- skip rather than fail unwinnably.
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@713881670b6b3676cda39549040e2d88c70d582e # v8.2.0
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
