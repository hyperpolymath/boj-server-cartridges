# SPDX-License-Identifier: MPL-2.0
name: "Bug report"
description: "Report something that is broken or behaving unexpectedly."
labels: ["bug"]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: "What happened?"
      description: "Describe the problem. What did you see?"
    validations:
      required: true
  - type: textarea
    id: repro-steps
    attributes:
      label: "Steps to reproduce"
      description: "Exact steps that trigger the problem, one per line."
      placeholder: "1. ...\n2. ...\n3. ..."
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: "Expected behaviour"
      description: "What did you expect to happen instead?"
  - type: input
    id: version
    attributes:
      label: "Version"
      placeholder: "e.g. 0.2.0 / commit SHA"
    validations:
      required: true
  - type: dropdown
    id: component
    attributes:
      label: "Component"
      description: "Which part of the cartridge registry is affected?"
      options:
        - "A cartridge (name it below)"
        - "Cartridge schema / validation"
        - "Templates"
        - "Tooling / scripts"
        - "CI"
        - "Other"
  - type: textarea
    id: logs
    attributes:
      label: "Relevant logs / output"
      description: "Paste any logs, validator output, or stack traces."
      render: shell
  - type: textarea
    id: environment
    attributes:
      label: "Environment"
      description: "OS, Deno/Zig/Idris2 versions, host details"
