name = "hetzner-mcp"
description = "Hetzner Cloud cartridge — Bearer token auth, server/volume/firewall/network management with per-second rate limiting"
version = "0.2.0"
domain = "Cloud"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["api_token"]

[api]
base_url = "https://api.hetzner.cloud/v1"
rate_limit_per_hour = 3600
