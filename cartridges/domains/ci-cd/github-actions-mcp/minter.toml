name = "github-actions-mcp"
description = "GitHub Actions CI/CD cartridge — workflow listing, run management, job inspection, artifacts, logs, dispatch, re-run, cancel, secrets, runners, caches"
version = "0.1.0"
domain = "CI/CD"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["github_token"]

[api]
base_url = "https://api.github.com"
accept_header = "application/vnd.github+json"
