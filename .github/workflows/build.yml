#
# SonarQube Cloud (SonarCloud) static analysis. Analysis scope + exclusions
# live in sonar-project.properties. Requires the SONAR_TOKEN repository secret
# (Settings -> Secrets and variables -> Actions).
# Project: https://sonarcloud.io/project/overview?id=hyperpolymath_boj-server-cartridges
name: Build
on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]
permissions:
  contents: read
jobs:
  sonarqube:
    name: SonarQube
    # Dependabot-authored runs get a secrets-restricted GITHUB_TOKEN and
    # cannot see repo Actions secrets (only the separate Dependabot secrets
    # store, which SONAR_TOKEN isn't in) -- skip rather than fail unwinnably.
    #
    # `vars.SONAR_ENABLED` makes the scan opt-in. This is NOT a way to hide a
    # real quality finding: the scan currently fails with HTTP 403 Forbidden
    # while fetching JRE metadata, i.e. it never authenticates and never
    # analyses anything. That is a credential/project-binding fault needing an
    # owner action (rotate SONAR_TOKEN and confirm the SonarCloud binding for
    # hyperpolymath_boj-server-cartridges), not a YAML defect — the YAML is
    # otherwise clean. A permanently-red check that no contributor can fix is
    # itself noise, and it masks genuine reds on main.
    #
    # TO RE-ENABLE once the token is rotated: set repository variable
    # SONAR_ENABLED=true (Settings -> Secrets and variables -> Actions ->
    # Variables). Gating on `vars.` is deliberate; `secrets.*` is unavailable
    # in `if:` expression context and is the estate compile-error anti-pattern.
    if: github.actor != 'dependabot[bot]' && vars.SONAR_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0  # Shallow clones should be disabled for a better relevancy of analysis
      - name: SonarQube Scan
        uses: SonarSource/sonarqube-scan-action@22918119ff8e1ca75a623e15c8296b6ea4fbe28f # v8.2.1
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
