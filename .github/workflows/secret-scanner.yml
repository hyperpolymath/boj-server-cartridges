# SPDX-License-Identifier: MPL-2.0
name: Secret Scanner
on:
  pull_request:
  push:
    branches: [main]
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  scan:
    permissions:
      contents: read
      pull-requests: write
      actions: read
    uses: hyperpolymath/standards/.github/workflows/secret-scanner-reusable.yml@d135b05bfc647d0c0fbfedc7e80f37ea50f49236
    secrets: inherit
  trufflehog:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
      - name: TruffleHog Secret Scan
        uses: trufflesecurity/trufflehog@00155c9dc586f34d189adc83d3ac2698c2ec551f # v3.95.8
        with:
          # Empty base = full-tree scan; the action's default BASE/HEAD diff
          # mode errors with "BASE == HEAD" on direct pushes to main.
          base: ""
          # The action appends its own --fail on the full-tree (empty-base)
          # scan path; a --fail here too triggers
          # "flag 'fail' cannot be repeated". --only-verified is enough.
          extra_args: --only-verified
