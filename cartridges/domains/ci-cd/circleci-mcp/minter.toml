name = "circleci-mcp"
description = "CircleCI CI/CD cartridge — pipeline listing, workflow management, job inspection, artifacts, pipeline triggering, workflow cancellation, environment variables"
version = "0.1.0"
domain = "CI/CD"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["circleci_token"]

[api]
base_url = "https://circleci.com/api/v2"
