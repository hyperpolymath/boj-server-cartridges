name = "grafana-mcp"
description = "Grafana monitoring cartridge — dashboard CRUD, datasource queries, alert management, annotations, folder browsing, health checks"
version = "0.1.0"
domain = "Monitoring"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["grafana_api_token"]

[api]
base_url = "https://grafana.example.com/api"
