name = "hackage-mcp"
description = "Hackage registry cartridge — Haskell package search, metadata, version listing, download stats, dependencies, reverse deps, maintainers, deprecation, cabal files, user profiles"
version = "0.2.0"
domain = "Registry"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "basic"
credential_source = "vault-mcp"
fields = ["hackage_credentials"]

[api]
base_url = "https://hackage.haskell.org"
