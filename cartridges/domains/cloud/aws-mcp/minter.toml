name = "aws-mcp"
description = "AWS SDK cartridge — Signature V4 auth, multi-service routing (S3/Lambda/DynamoDB/SQS/CloudWatch/IAM/STS) with rate-limit back-pressure"
version = "0.3.0"
domain = "Cloud"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "aws_signature_v4"
credential_source = "vault-mcp"
fields = ["access_key_id", "secret_access_key", "region", "session_token"]

[services]
s3 = "https://s3.{region}.amazonaws.com"
lambda = "https://lambda.{region}.amazonaws.com"
dynamodb = "https://dynamodb.{region}.amazonaws.com"
sqs = "https://sqs.{region}.amazonaws.com"
cloudwatch = "https://monitoring.{region}.amazonaws.com"
iam = "https://iam.amazonaws.com"
sts = "https://sts.{region}.amazonaws.com"
