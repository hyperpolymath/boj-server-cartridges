name = "discord-mcp"
description = "Discord REST API v10 cartridge — messages, channels, guilds, members, reactions, threads, search, status, file uploads"
version = "0.1.0"
domain = "Comms"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
type = "bot_token"
header = "Authorization"
prefix = "Bot"
base_url = "https://discord.com/api/v10/"

[rate_limiting]
strategy = "bucket"
description = "Per-route bucket-based rate limiting via X-RateLimit-Bucket headers"

[actions]
count = 16
list = [
    "SendMessage",
    "EditMessage",
    "DeleteMessage",
    "ListChannels",
    "GetChannel",
    "ListGuilds",
    "GetGuild",
    "ListMembers",
    "GetMember",
    "AddReaction",
    "RemoveReaction",
    "CreateThread",
    "ListThreads",
    "SearchMessages",
    "SetStatus",
    "UploadFile",
]
