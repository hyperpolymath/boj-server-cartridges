name = "opam-mcp"
description = "opam registry cartridge — OCaml package search, metadata, version listing, dependencies, reverse deps, maintainers, tags, opam file retrieval"
version = "0.2.0"
domain = "Registry"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "none"

[api]
base_url = "https://opam.ocaml.org"
