name = "cloudflare-mcp"
description = "Cloudflare API v4 cartridge -- DNS records, zone settings, SSL/TLS, cache purge"
version = "0.1.0"
domain = "Cloud"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer"
token_env = "CF_API_TOKEN"
base_url = "https://api.cloudflare.com/client/v4/"

[actions]
list = [
    "ListZones",
    "GetZone",
    "ListDnsRecords",
    "GetDnsRecord",
    "CreateDnsRecord",
    "UpdateDnsRecord",
    "PatchDnsRecord",
    "DeleteDnsRecord",
    "GetZoneSetting",
    "UpdateZoneSetting",
    "PurgeCache",
]
