name = "obsidian-mcp"
description = "Obsidian vault cartridge — note search, content retrieval, backlink navigation, tag browsing, dataview queries, frontmatter extraction, daily notes, templates, vault stats"
version = "0.2.0"
domain = "Knowledge"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["obsidian_rest_api_key"]

[api]
base_url = "https://127.0.0.1:27124"
local_only = true
