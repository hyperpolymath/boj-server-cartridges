name = "render-mcp"
description = "Render REST API v1 cartridge -- services, deploys, env groups, custom domains, jobs, bandwidth"
version = "0.1.0"
domain = "Cloud"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer"
token_env = "RENDER_API_KEY"
base_url = "https://api.render.com/v1/"

[rate_limit]
requests_per_minute = 100

[actions]
list = [
    "ListServices",
    "GetService",
    "CreateService",
    "DeleteService",
    "ListDeploys",
    "TriggerDeploy",
    "GetDeploy",
    "ListEnvGroups",
    "GetEnvGroup",
    "ListCustomDomains",
    "AddCustomDomain",
    "ListJobs",
    "CreateJob",
    "SuspendService",
    "ResumeService",
    "GetBandwidth",
]
