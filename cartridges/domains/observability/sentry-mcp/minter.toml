name = "sentry-mcp"
description = "Sentry error tracking cartridge — issue listing, event retrieval, project browsing, releases, DSN lookup, teams, tags, resolution, performance transactions"
version = "0.1.0"
domain = "Monitoring"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["sentry_auth_token"]

[api]
base_url = "https://sentry.io/api/0"
