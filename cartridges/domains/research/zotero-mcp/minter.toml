name = "zotero-mcp"
description = "Zotero reference manager cartridge — library search, item retrieval, collection browsing, tag management, attachment access, citation export, note extraction, saved searches, group libraries, bibliography generation"
version = "0.2.0"
domain = "Research"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["zotero_api_key"]

[api]
base_url = "https://api.zotero.org"
local_only = false
