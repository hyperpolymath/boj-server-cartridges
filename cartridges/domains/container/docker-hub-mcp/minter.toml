name = "docker-hub-mcp"
description = "Docker Hub container registry MCP cartridge — images, tags, namespaces, manifests, repositories, stars"
version = "0.2.0"
domain = "Container"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer"
token_type = "jwt"
login_endpoint = "POST /v2/users/login"
base_url = "https://hub.docker.com/v2/"
two_phase = true

[rate_limit]
pull_authenticated = 200
pull_anonymous = 100
window = "6h"

[actions]
count = 16
list = [
    "SearchImages",
    "GetRepository",
    "ListTags",
    "GetTag",
    "ListNamespaces",
    "GetManifest",
    "DeleteTag",
    "GetRateLimit",
    "ListOrgs",
    "CreateRepository",
    "DeleteRepository",
    "GetDockerfile",
    "ListStarred",
    "StarRepository",
    "UnstarRepository",
    "GetUser",
]
