# minter.toml -- Cartridge metadata for postgresql-mcp.

name = "postgresql-mcp"
description = "PostgreSQL database cartridge with parameterised queries, transaction support, and libpq C-ABI integration"
version = "0.1.0"
domain = "Database"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "connection_string"
vault_mcp = true
format = "postgres://user:pass@host:5432/db"

[actions]
count = 16
list = [
    "Connect",
    "Disconnect",
    "Query",
    "Execute",
    "BeginTx",
    "CommitTx",
    "RollbackTx",
    "ListDatabases",
    "ListSchemas",
    "ListTables",
    "DescribeTable",
    "ListIndices",
    "Explain",
    "CopyTo",
    "CopyFrom",
    "Notify",
]

[state_machine]
states = ["Disconnected", "Connected", "InTransaction", "QueryRunning", "Error"]
initial = "Disconnected"
