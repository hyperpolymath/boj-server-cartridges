# SPDX-License-Identifier: MPL-2.0
# Cartridge manifest validation — runs the validator on every push / PR.
# STRICT MODE: fails the job on any manifest that doesn't validate against
# the pinned schema. Flipped from audit to strict on 2026-06-01 after the
# drift inventory reached 139/139 passing.

name: Cartridge Schema

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - name: Set up Deno
        uses: denoland/setup-deno@22d081ff2d3a40755e97629de92e3bcbfa7cf2ed # v2
        with:
          deno-version: v2.x

      - name: Verify schema mirror SHA-256 matches PINNED-SHA
        run: |
          set -euo pipefail
          actual=$(sha256sum schemas/cartridge-v1.json | awk '{print $1}')
          pinned=$(awk -F'"' '/content_sha256/ {print $2}' schemas/PINNED-SHA)
          if [ "$actual" != "$pinned" ]; then
            echo "::error::schema mirror drift: actual $actual vs pinned $pinned"
            echo "Update schemas/PINNED-SHA when intentionally bumping the mirror."
            exit 1
          fi
          echo "Schema mirror matches pinned SHA-256: $pinned"

      - name: Validator unit tests
        working-directory: tools/validate-cartridges
        run: deno task test

      - name: Validate all cartridge manifests (strict)
        working-directory: tools/validate-cartridges
        run: |
          set -euo pipefail
          # Tee audit output into the step summary so the report is browsable
          # even on success, then run strict to enforce zero violations.
          deno task audit | tee "$GITHUB_STEP_SUMMARY"
          deno task strict
