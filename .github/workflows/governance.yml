# SPDX-License-Identifier: MPL-2.0
# governance.yml — single wrapper calling the shared estate governance bundle
# in hyperpolymath/standards instead of carrying per-repo copies.

name: Governance
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:
# Estate guardrail: cancel superseded runs so re-pushes / rebased PR updates
# do not pile up queued runs against the shared account-wide Actions
# concurrency pool. Applied only to read-only check workflows.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
permissions:
  contents: read
jobs:
  governance:
    uses: hyperpolymath/standards/.github/workflows/governance-reusable.yml@81dbf2dd854b1444fd6236fa2352474383b2c2b9
