name = "railway-mcp"
description = "Railway GraphQL API v2 cartridge -- projects, services, deployments, variables, domains, logs, metrics"
version = "0.1.0"
domain = "Cloud"
protocols = [
    "MCP",
    "GraphQL",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer"
token_env = "RAILWAY_API_TOKEN"
base_url = "https://backboard.railway.app/graphql/v2"

[actions]
list = [
    "ListProjects",
    "GetProject",
    "CreateProject",
    "DeleteProject",
    "ListServices",
    "GetService",
    "ListDeployments",
    "GetDeployment",
    "Redeploy",
    "ListVariables",
    "SetVariable",
    "DeleteVariable",
    "ListDomains",
    "AddDomain",
    "GetLogs",
    "GetMetrics",
]
