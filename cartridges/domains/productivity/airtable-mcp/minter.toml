name = "airtable-mcp"
description = "Airtable cartridge — base listing, schema retrieval, record CRUD, field listing, view browsing, webhooks, comments"
version = "0.2.0"
domain = "Productivity"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["airtable_api_key"]

[api]
base_url = "https://api.airtable.com/v0"
local_only = false
