name = "pypi-mcp"
description = "PyPI registry cartridge — Python package search, metadata, version listing, download stats, dependencies, release files, maintainers, classifiers, vulnerabilities, project URLs"
version = "0.2.0"
domain = "Registry"
protocols = [
    "MCP",
    "REST",
]
tier = "Ayo"
backend = "universal"
generate_panel = true

[auth]
method = "bearer_token"
credential_source = "vault-mcp"
fields = ["pypi_token"]

[api]
base_url = "https://pypi.org/pypi"
stats_url = "https://pypistats.org/api"
